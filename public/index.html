<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    function updateFavicon() {
      const date = new Date();
      const month = date.getMonth(); // 0-11
      const day = date.getDate();
      
      let emoji = '⛷️'; // Default ski emoji
      
      // If it's between May 1st and November 30th, show running shoe
      if ((month === 4 && day >= 1) || // May
          (month > 4 && month < 10) || // June through October
          (month === 10 && day <= 30)) { // November 1-30
        emoji = '👟';
      }
      
      const favicon = document.querySelector('link[rel="icon"]');
      favicon.href = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>${emoji}</text></svg>`;
    }

    // Run on page load
    document.addEventListener('DOMContentLoaded', updateFavicon);
  </script>
  <link
    rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛷️</text></svg>"
  />
  <title>Conditions Beta</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Open+Sans:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
</body>
</html>
